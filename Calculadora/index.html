<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Básica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

  <div class="card shadow" style="width: 480px;">

    <div class="card-header bg-primary text-white text-center py-3">
      <h4 class="mb-0 fw-bold">Calculadora Básica</h4>
    </div>

    <div class="card-body p-4">

      <div class="mb-3">
        <label for="num1" class="form-label text-primary fw-semibold">Primer Número</label>
        <input type="number" id="num1" class="form-control" placeholder="0">
      </div>

      <div class="mb-4">
        <label for="num2" class="form-label text-primary fw-semibold">Segundo Número</label>
        <input type="number" id="num2" class="form-control" placeholder="0">
      </div>

      <div class="d-grid gap-2 mb-4">
        <button class="btn btn-success py-2" onclick="calcular('suma')">Sumar</button>
        <button class="btn py-2 text-dark" style="background-color: #FFC107;" onclick="calcular('resta')">Restar</button>
        <button class="btn py-2 text-dark" style="background-color: #00BCD4;" onclick="calcular('multiplicacion')">Multiplicar</button>
        <button class="btn btn-danger py-2" onclick="calcular('division')">Dividir</button>
      </div>

      <div>
        <label for="resultado" class="form-label text-primary fw-semibold">Resultado</label>
        <input type="text" id="resultado" class="form-control" readonly placeholder="—">
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Vincula el archivo JS externo -->
  <script src="calculadora.js"></script>
</body>
</html>
